services:
  kafka:
    image: confluentinc/cp-kafka:8.1.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_KRAFT_MODE: 'true'
      CLUSTER_ID: 'q1ShLeu3T7G2zjUKw9p6vQ'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 104857600
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - kafka_kraft:/var/lib/kafka/data
    healthcheck:
      # test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      # interval: 10s
      # timeout: 5s
      # retries: 10
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    environment:
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
    ports:
      - "8123:8123"
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./src/code/infra/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  clickhouse_monitoring:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_monitoring
    environment:
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
    ports:
      - "8124:8123"
      - "9001:9000"
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - clickhouse_monitoring_data:/var/lib/clickhouse
      - ./src/code/infra/monitoring_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  stock_service:
    build:
      context: ./src/code/stock_service
    container_name: stock_service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - REPLAY_SPEEDUP=5.0
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./src/code/infra:/app/infra
    restart: on-failure

  news_service:
    build:
      context: ./src/code/news_service
    container_name: news_service
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - CLICKHOUSE_URL=http://default:password@clickhouse:8123
      - USE_DUMMY_API=true
      - API_KEY=${API_KEY:-dummy_key}
      - API_URL=${API_URL:-dummy_url}
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./src/code/infra:/app/infra
    restart: on-failure

  backend:
    build:
      context: ./src/code/backend
    container_name: backend
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - USE_DUMMY_FIREBASE=true
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./src/code/infra:/app/infra
    restart: on-failure

  decision_service:
    build:
      context: ./src/code/decision_service
    container_name: decision_service
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - ./src/code/infra:/app/infra
    restart: on-failure

  calc_service:
    build:
      context: ./src/code/calc_service
    container_name: calc_service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - calc_data:/app/data
      - ./src/code/infra:/app/infra
    restart: on-failure

  kafka_monitor:
    build:
      context: ./src/code/kafka_monitor
    container_name: kafka_monitor
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse_monitoring:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
    volumes:
      - ./src/code/infra:/app/infra
    restart: on-failure

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      clickhouse_monitoring:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - grafana_data:/var/lib/grafana
      - ./src/code/infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./src/code/infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    restart: on-failure

volumes:
  kafka_kraft:
  clickhouse_data:
  clickhouse_monitoring_data:
  calc_data:
  grafana_data:
